<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HollerPro — Messages</title>
<script src="theme.js"></script>
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400..800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
html, body { height: 100%; overflow: hidden; }
.app { height: 100vh; display: grid; grid-template-columns: 76px 280px 1fr; }

.rail { background: var(--bg-sunk); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 14px 0; gap: 10px; }
.rail-item { width: 48px; height: 48px; border-radius: 16px; display: grid; place-items: center; color: var(--text-2); background: var(--bg-elev); border: 1px solid var(--border); cursor: pointer; transition: border-radius .2s, background .2s, color .2s; text-decoration: none; }
.rail-item:hover { border-radius: 13px; background: var(--bg-sunk); }
.rail-item.active { background: var(--accent); color: var(--accent-ink); border-color: transparent; border-radius: 14px; }
.rail-spacer { flex: 1; }

.dlist { background: var(--bg-elev); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
.dl-head { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.dl-head h2 { font-family: var(--font-display); font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
.dl-new { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent); cursor: pointer; }
.dl-scroll { flex: 1; overflow-y: auto; padding: 6px 8px; min-height: 0; }
.dl-lbl { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); padding: 10px 10px 5px; }
.conv { display: flex; gap: 10px; padding: 9px 10px; border-radius: var(--r-md); cursor: pointer; transition: background .12s; }
.conv:hover { background: var(--bg-sunk); }
.conv.active { background: var(--accent-soft); }
.conv .c-av { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-weight: 700; font-size: 14px; color: #fff; }
.conv .c-body { flex: 1; min-width: 0; }
.conv .c-top { display: flex; justify-content: space-between; gap: 6px; }
.conv .c-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv.active .c-name { color: var(--accent); }
.conv .c-time { font-size: 11px; color: var(--text-3); flex-shrink: 0; }
.conv .c-prev { font-size: 12.5px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.dl-foot { border-top: 1px solid var(--border); padding: 10px 12px; display: flex; align-items: center; gap: 9px; }
.dl-foot .me { display: flex; align-items: center; gap: 9px; flex: 1; }
.dl-foot .me b { font-size: 13.5px; font-weight: 700; display: block; }
.dl-foot .me span { font-size: 11.5px; color: var(--text-2); }
.icon-btn { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; color: var(--text-2); transition: background .12s, color .12s; flex: none; cursor: pointer; }
.icon-btn:hover { background: var(--bg-sunk); color: var(--text); }

.chat { display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
.chat-head { height: 60px; flex: none; display: flex; align-items: center; gap: 12px; padding: 0 20px; border-bottom: 1px solid var(--border); background: color-mix(in oklab, var(--bg-elev) 60%, var(--bg)); }
.chat-head .title b { font-family: var(--font-display); font-size: 16px; font-weight: 800; letter-spacing: -0.02em; }
.chat-head .title .sub { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 5px; }
.chat-head .lock-pill { margin-left: auto; }
.dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--sage); display: inline-block; }

.thread { flex: 1; overflow-y: auto; padding: 20px 20px 8px; min-height: 0; }
.thread-inner { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 3px; }

.priv-banner { text-align: center; margin: 8px auto 20px; max-width: 440px; }
.priv-banner .ring { width: 48px; height: 48px; border-radius: 50%; background: var(--sage-soft); color: var(--sage); display: grid; place-items: center; margin: 0 auto 10px; }
.priv-banner h3 { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; }
.priv-banner p { font-size: 13.5px; color: var(--text-2); margin-top: 5px; line-height: 1.6; }

.day-sep { display: flex; align-items: center; gap: 12px; color: var(--text-3); font-size: 11.5px; font-weight: 600; margin: 14px 0 8px; }
.day-sep::before, .day-sep::after { content:""; height: 1px; background: var(--border); flex: 1; }

.msg { display: flex; gap: 10px; padding: 3px 0; }
.msg .m-av { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-weight: 700; font-size: 13px; color: #fff; }
.msg .m-body { min-width: 0; }
.msg .m-head { display: flex; align-items: baseline; gap: 8px; }
.msg .m-head b { font-weight: 700; font-size: 14px; }
.msg .m-head .t { font-size: 11px; color: var(--text-3); }
.bubble { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; padding: 8px 13px; font-size: 14px; line-height: 1.5; margin-top: 4px; max-width: 500px; width: fit-content; white-space: pre-wrap; word-break: break-word; }
.msg.me { flex-direction: row-reverse; }
.msg.me .m-head { flex-direction: row-reverse; }
.msg.me .m-body { display: flex; flex-direction: column; align-items: flex-end; }
.msg.me .bubble { background: var(--accent); color: var(--accent-ink); border-color: transparent; border-radius: 14px 4px 14px 14px; }

.empty-thread { text-align: center; padding: 40px 20px; color: var(--text-2); font-size: 14px; }
.no-conv { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--text-2); gap: 10px; }
.no-conv p { font-size: 15px; }

.chat-composer { flex: none; padding: 12px 20px 16px; }
.cc-inner { max-width: 700px; margin: 0 auto; position: relative; }
.cc-hint { font-size: 12px; color: var(--text-3); margin: 0 0 7px 4px; }
.cc-hint code { font-family: ui-monospace,monospace; background: var(--bg-sunk); padding: 1px 5px; border-radius: 5px; color: var(--accent); }
.cc-box { display: flex; align-items: flex-end; gap: 8px; background: var(--bg-elev); border: 1.5px solid var(--border); border-radius: var(--r-lg); padding: 7px 7px 7px 13px; box-shadow: var(--shadow-sm); transition: border-color .2s; }
.cc-box:focus-within { border-color: var(--accent); }
.cc-input { flex: 1; min-height: 36px; max-height: 120px; background: none; border: none; outline: none; font-size: 14px; color: var(--text); resize: none; font-family: inherit; line-height: 1.5; padding: 4px 0; }
.cc-input::placeholder { color: var(--text-3); }
.cc-send { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); color: var(--accent-ink); display: grid; place-items: center; flex: none; box-shadow: var(--shadow-glow); cursor: pointer; border: none; }
.cc-send:hover { background: var(--accent-hover); }

/* people picker */
.pp-pop { position: absolute; left: 0; right: 0; bottom: calc(100% + 8px); background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); overflow: hidden; z-index: 40; }
.pp-head { display: flex; align-items: center; gap: 9px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.pp-head svg { color: var(--accent); flex-shrink: 0; }
.pp-head input { flex: 1; border: none; outline: none; background: none; font-size: 14px; color: var(--text); }
.pp-head input::placeholder { color: var(--text-3); }
.pp-close { font-size: 11px; font-weight: 700; color: var(--text-3); background: var(--bg-sunk); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; cursor: pointer; }
.pp-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.pp-chips:empty { display: none; }
.pchip { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); color: var(--accent); font-weight: 650; font-size: 13px; padding: 4px 6px 4px 10px; border-radius: var(--r-pill); }
.pchip .x { width: 15px; height: 15px; border-radius: 50%; background: color-mix(in oklab, var(--accent) 22%, transparent); display: grid; place-items: center; font-size: 9px; cursor: pointer; }
.pp-list { max-height: 220px; overflow-y: auto; padding: 6px; }
.pp-empty { padding: 18px; text-align: center; color: var(--text-3); font-size: 13px; }
.pp-row { display: flex; align-items: center; gap: 10px; padding: 7px 9px; border-radius: var(--r-sm); cursor: pointer; }
.pp-row:hover, .pp-row.hl { background: var(--bg-sunk); }
.pp-row .pp-av { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-weight: 700; font-size: 11px; color: #fff; flex-shrink: 0; }
.pp-row .pn { font-weight: 650; font-size: 13.5px; }
.pp-row .ph { font-size: 12px; color: var(--text-3); }
.pp-row .add { margin-left: auto; color: var(--accent); font-weight: 700; font-size: 13px; }
.pp-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--border); background: var(--bg-elev-2); }
.pp-foot .ct { font-size: 12.5px; color: var(--text-2); }

@media (max-width: 900px) { .app { grid-template-columns: 1fr; } .rail, .dlist { display: none; } }
</style>
</head>
<body>
<div class="app">
  <nav class="rail">
    <a class="rail-item" href="app.html" title="Forums">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><circle cx="7" cy="17" r="2.1" fill="currentColor" stroke="none"/><path d="M7 11.4A5.6 5.6 0 0 1 12.6 17"/><path d="M7 6.8A10.2 10.2 0 0 1 17.2 17"/><path d="M7 2.6A14.4 14.4 0 0 1 21.4 17"/></svg>
    </a>
    <div class="rail-item active" title="Messages">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="rail-spacer"></div>
    <button class="theme-toggle rail-item" data-theme-toggle aria-label="Toggle theme" style="border:1.5px solid var(--border)">
      <svg class="sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
      <svg class="moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/></svg>
    </button>
  </nav>

  <aside class="dlist">
    <div class="dl-head">
      <h2>Messages</h2>
      <button class="dl-new" title="New message" onclick="openPP()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="dl-scroll scroll" id="convList">
      <div class="dl-lbl">Loading…</div>
    </div>
    <div class="dl-foot">
      <div class="me">
        <span class="avatar" id="dlAv" style="width:32px;height:32px;font-size:12px"></span>
        <div><b id="dlName"></b><span>Active now</span></div>
      </div>
      <button class="icon-btn" onclick="logout()" title="Log out">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="chat" id="chatPane">
    <header class="chat-head">
      <div id="chatAvatars"></div>
      <div class="title">
        <b id="chatTitle">Select a conversation</b>
        <div class="sub" id="chatSub"></div>
      </div>
      <span class="pill sage lock-pill" id="chatPill" style="display:none">🔒 Private</span>
    </header>
    <div class="thread scroll" id="threadEl">
      <div class="thread-inner" id="threadInner">
        <div class="no-conv">
          <p>Select a conversation or start a new one.</p>
          <button class="btn btn-primary btn-sm" onclick="openPP()">New private message</button>
        </div>
      </div>
    </div>
    <div class="chat-composer" id="composerEl">
      <div class="cc-inner">
        <div class="pp-pop" id="ppPop" hidden>
          <div class="pp-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="ppSearch" placeholder="Search by username…" autocomplete="off" />
            <button class="pp-close" id="ppClose">Esc</button>
          </div>
          <div class="pp-chips" id="ppChips"></div>
          <div class="pp-list scroll" id="ppList"><div class="pp-empty">Type to search</div></div>
          <div class="pp-foot">
            <span class="ct" id="ppCount">No one added</span>
            <button class="btn btn-primary btn-sm" id="ppStart" disabled>Open chat</button>
          </div>
        </div>
        <p class="cc-hint">💡 Type <code>/p/</code> to address a new private message</p>
        <div class="cc-box">
          <textarea class="cc-input" id="msgInput" rows="1" placeholder="Message… (or /p/ to start new)"></textarea>
          <button class="cc-send" id="sendBtn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
var COLORS = ['#6c63ff','#e879f9','#43d97a','#fbbf24','#f4645f','#38bdf8','#fb923c','#a3e635'];
function aColor(u){ var h=0; for(var c of(u||'x'))h=(h*31+c.charCodeAt(0))&0x7fffffff; return COLORS[h%COLORS.length]; }
function ini(u){ return (u||'?').slice(0,2).toUpperCase(); }
function ago(ts){ var d=Math.floor((Date.now()-ts)/1000); if(d<60)return'just now'; if(d<3600)return Math.floor(d/60)+'m'; if(d<86400)return Math.floor(d/3600)+'h'; return Math.floor(d/86400)+'d'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var LS = {
  get: function(k,d){ try{ var v=localStorage.getItem(k); return v===null?d:JSON.parse(v); }catch{ return d; } },
  set: function(k,v){ localStorage.setItem(k,JSON.stringify(v)); },
  users: function(){ return this.get('f:users',{}); },
  msgs: function(){ return this.get('f:personal',[]); }
};

// Firebase
var db = null;
if(window.FB_CONFIG){
  try{ if(!firebase.apps.length) firebase.initializeApp(window.FB_CONFIG); db = firebase.database(); }catch(e){}
}

// BroadcastChannel
var bc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('hollerpro-msgs') : null;
if(bc) bc.onmessage = function(){ buildConvList(); if(activeConvKey) listenToConv(activeConvKey); };

// auth guard
var session = LS.get('f:session', null);
if(!session || session === '__demo__'){ location.href = 'auth.html'; }
var users = LS.users();
var uRec = users[session.toLowerCase()];
if(!uRec){ location.href = 'auth.html'; }
var me = uRec.username;

// init footer
(function(){
  var av = document.getElementById('dlAv');
  av.textContent = ini(me); av.style.background = aColor(me);
  document.getElementById('dlName').textContent = me;
})();

function logout(){ LS.set('f:session',null); location.href='auth.html'; }

// ── thread key: sorted participant usernames joined by comma ──
function threadKey(participants){
  return participants.map(function(p){ return p.toLowerCase(); }).sort().join(',');
}

// ── all messages this user is part of ──
var allMessages = []; // sorted array of message objects
var activeConvKey = null;
var convListener = null;

function getUserMessages(){
  var myL = me.toLowerCase();
  if(db){
    db.ref('hp_messages').orderByChild('createdAt').on('value', function(snap){
      allMessages = [];
      if(snap.exists()){
        snap.forEach(function(child){
          var m = Object.assign({id:child.key}, child.val());
          var parts = [m.sender].concat(m.recipients||[]);
          if(parts.some(function(p){ return p.toLowerCase()===myL; })){
            allMessages.push(m);
          }
        });
      }
      allMessages.sort(function(a,b){ return a.createdAt - b.createdAt; });
      buildConvList();
      if(activeConvKey) renderThread(activeConvKey);
    });
  } else {
    allMessages = LS.msgs().filter(function(m){
      var parts = [m.sender].concat(m.recipients||[]);
      return parts.some(function(p){ return p.toLowerCase()===myL; });
    }).sort(function(a,b){ return a.createdAt - b.createdAt; });
    buildConvList();
  }
}

// ── conversation list ──
function buildConvList(){
  var myL = me.toLowerCase();
  // group messages by thread key
  var threads = {}; // key → { key, lastMsg, participants }
  allMessages.forEach(function(m){
    var parts = [m.sender].concat(m.recipients||[]);
    var key = threadKey(parts);
    if(!threads[key]){
      threads[key] = { key:key, msgs:[], participants: parts };
    }
    threads[key].msgs.push(m);
  });

  var keys = Object.keys(threads).sort(function(a,b){
    var la = threads[a].msgs[threads[a].msgs.length-1].createdAt;
    var lb = threads[b].msgs[threads[b].msgs.length-1].createdAt;
    return lb - la;
  });

  var el = document.getElementById('convList');
  if(!keys.length){
    el.innerHTML = '<div class="dl-lbl">No messages yet</div><div style="padding:16px;font-size:13px;color:var(--text-3)">Start a private message by clicking +</div>';
    return;
  }

  el.innerHTML = '<div class="dl-lbl">Private</div>' + keys.map(function(key){
    var t = threads[key];
    var others = t.participants.filter(function(p){ return p.toLowerCase()!==myL; });
    var display = others.join(' & ') || me;
    var last = t.msgs[t.msgs.length-1];
    var isActive = key === activeConvKey;
    var col = aColor(others[0]||me);
    return '<div class="conv'+(isActive?' active':'')+'" onclick="openConv(\''+esc(key)+'\')">'
      +'<div class="c-av" style="background:'+col+'">'+ini(others[0]||me)+'</div>'
      +'<div class="c-body"><div class="c-top"><span class="c-name">'+esc(display)+'</span>'
      +'<span class="c-time">'+ago(last.createdAt)+'</span></div>'
      +'<div class="c-prev">'+esc((last.sender.toLowerCase()===myL?'You: ':last.sender+': ')+last.content.slice(0,40))+'</div></div></div>';
  }).join('');
}

// ── open a conversation ──
function openConv(key){
  activeConvKey = key;
  buildConvList();
  renderThread(key);

  // find participants from allMessages
  var thread = allMessages.filter(function(m){
    return threadKey([m.sender].concat(m.recipients||[])) === key;
  });
  if(!thread.length) return;
  var myL = me.toLowerCase();
  var parts = [thread[0].sender].concat(thread[0].recipients||[]);
  var others = parts.filter(function(p){ return p.toLowerCase()!==myL; });
  var display = others.join(' & ');

  document.getElementById('chatTitle').textContent = display;
  document.getElementById('chatSub').innerHTML = '<span class="dot-live"></span> '+display;
  document.getElementById('chatPill').style.display = '';
  document.getElementById('chatPill').textContent = '🔒 Private · '+parts.length+' people';
  document.getElementById('chatAvatars').innerHTML = others.slice(0,2).map(function(o){
    return '<div style="width:32px;height:32px;border-radius:50%;background:'+aColor(o)+';display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0">'+ini(o)+'</div>';
  }).join('');
  document.getElementById('msgInput').placeholder = 'Message '+display+'…';
}

function renderThread(key){
  var msgs = allMessages.filter(function(m){
    return threadKey([m.sender].concat(m.recipients||[])) === key;
  });
  var myL = me.toLowerCase();
  var inner = document.getElementById('threadInner');

  if(!msgs.length){
    inner.innerHTML = '<div class="empty-thread">No messages yet — say hello!</div>';
    return;
  }

  var parts = [msgs[0].sender].concat(msgs[0].recipients||[]);
  var others = parts.filter(function(p){ return p.toLowerCase()!==myL; });
  inner.innerHTML = '<div class="priv-banner"><div class="ring">'
    +'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
    +'</div><h3>Private with '+esc(others.join(' & '))+'</h3>'
    +'<p>This conversation is only visible to you and '+esc(others.join(', '))+'. It never appears on the public timeline.</p></div>'
    +'<div class="day-sep">Messages</div>'
    + msgs.map(function(m){
      var isMe = m.sender.toLowerCase() === myL;
      var col = aColor(m.sender);
      return '<div class="msg'+(isMe?' me':'')+'">'
        +'<div class="m-av" style="background:'+col+'">'+ini(m.sender)+'</div>'
        +'<div class="m-body"><div class="m-head"><b>'+esc(m.sender)+'</b><span class="t">'+ago(m.createdAt)+'</span></div>'
        +'<div class="bubble">'+esc(m.content)+'</div></div></div>';
    }).join('');

  // scroll to bottom
  setTimeout(function(){
    var t = document.getElementById('threadEl');
    t.scrollTop = t.scrollHeight;
  }, 0);
}

// ── send message ──
function sendMessage(){
  var text = document.getElementById('msgInput').value.trim();
  if(!text || !activeConvKey) return;

  // find recipients from conv key
  var myL = me.toLowerCase();
  var keyParts = activeConvKey.split(',');
  var recipientNames = [];

  // look up actual casing from known messages or users
  var knownUsers = LS.users();
  keyParts.forEach(function(lc){
    if(lc === myL) return;
    if(knownUsers[lc]) recipientNames.push(knownUsers[lc].username);
    else {
      // find from messages
      var found = null;
      allMessages.forEach(function(m){
        var all = [m.sender].concat(m.recipients||[]);
        all.forEach(function(n){ if(n.toLowerCase()===lc) found = n; });
      });
      if(found) recipientNames.push(found);
      else recipientNames.push(lc);
    }
  });

  var msg = { sender: me, recipients: recipientNames, content: text, createdAt: Date.now() };

  if(db){
    db.ref('hp_messages').push(msg);
  } else {
    msg.id = Date.now().toString(36)+Math.random().toString(36).slice(2);
    var all = LS.msgs();
    all.push(msg);
    LS.set('f:personal', all);
    allMessages.push(msg);
    allMessages.sort(function(a,b){ return a.createdAt - b.createdAt; });
    buildConvList();
    renderThread(activeConvKey);
    if(bc) bc.postMessage('msg');
  }
  document.getElementById('msgInput').value = '';
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('msgInput').addEventListener('keydown', function(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
document.getElementById('msgInput').addEventListener('input', function(){
  if(this.value.trimStart().startsWith('/p/')){
    this.value = '';
    openPP();
  }
  // auto-resize
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120)+'px';
});

// ── people picker ──
var ppSelected = [], ppHl = 0;

function getAllUsers(){
  var myL = me.toLowerCase();
  var result = [];
  // from localStorage
  Object.values(LS.users()).forEach(function(u){
    if(u.username.toLowerCase()!==myL) result.push(u.username);
  });
  // from Firebase message senders/recipients (to find users not yet locally cached)
  allMessages.forEach(function(m){
    var all = [m.sender].concat(m.recipients||[]);
    all.forEach(function(n){
      if(n.toLowerCase()!==myL && !result.some(function(r){ return r.toLowerCase()===n.toLowerCase(); })){
        result.push(n);
      }
    });
  });
  return result;
}

function openPP(){ document.getElementById('ppPop').hidden=false; renderPP(); setTimeout(function(){ document.getElementById('ppSearch').focus(); },0); }
function closePP(){ document.getElementById('ppPop').hidden=true; document.getElementById('ppSearch').value=''; ppSelected=[]; ppHl=0; }

function filteredPP(){
  var q = document.getElementById('ppSearch').value.trim().toLowerCase().replace(/^@/,'');
  var chosen = ppSelected.map(function(n){ return n.toLowerCase(); });
  return getAllUsers().filter(function(n){
    if(chosen.includes(n.toLowerCase())) return false;
    return !q || n.toLowerCase().startsWith(q);
  });
}

function renderPP(){
  var chips = document.getElementById('ppChips');
  chips.innerHTML = ppSelected.map(function(n,i){
    return '<span class="pchip"><span style="width:18px;height:18px;border-radius:50%;background:'+aColor(n)+';display:inline-grid;place-items:center;font-weight:700;font-size:8px;color:#fff">'+ini(n)+'</span>'+esc(n)+'<span class="x" data-rm="'+i+'">✕</span></span>';
  }).join('');

  var fl = filteredPP();
  var list = document.getElementById('ppList');
  var hasOthers = getAllUsers().length > 0;
  if(!fl.length){
    list.innerHTML = '<div class="pp-empty">'+(hasOthers ? 'No match.' : 'No other members yet — they need to sign up first.')+'</div>';
  } else {
    if(ppHl >= fl.length) ppHl = fl.length - 1;
    list.innerHTML = fl.map(function(n,i){
      return '<div class="pp-row'+(i===ppHl?' hl':'')+'" data-name="'+esc(n)+'">'
        +'<div class="pp-av" style="background:'+aColor(n)+'">'+ini(n)+'</div>'
        +'<div><div class="pn">'+esc(n)+'</div><div class="ph">@'+esc(n.toLowerCase())+'</div></div>'
        +'<span class="add">＋ Add</span></div>';
    }).join('');
  }
  var n = ppSelected.length;
  document.getElementById('ppCount').textContent = n===0?'No one added':n+' '+(n===1?'person':'people')+' added';
  document.getElementById('ppStart').disabled = n===0;
}

function ppAdd(name){
  if(!ppSelected.includes(name)){ ppSelected.push(name); document.getElementById('ppSearch').value=''; ppHl=0; renderPP(); document.getElementById('ppSearch').focus(); }
}

document.getElementById('ppList').addEventListener('click', function(e){
  var row = e.target.closest('[data-name]'); if(row) ppAdd(row.getAttribute('data-name'));
});
document.getElementById('ppChips').addEventListener('click', function(e){
  var x = e.target.closest('[data-rm]'); if(x){ ppSelected.splice(+x.getAttribute('data-rm'),1); renderPP(); }
});
document.getElementById('ppSearch').addEventListener('input', function(){ ppHl=0; renderPP(); });
document.getElementById('ppSearch').addEventListener('keydown', function(e){
  var fl = filteredPP();
  if(e.key==='ArrowDown'){ e.preventDefault(); ppHl=Math.min(ppHl+1,fl.length-1); renderPP(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); ppHl=Math.max(ppHl-1,0); renderPP(); }
  else if(e.key==='Enter'){ e.preventDefault(); if(fl[ppHl]) ppAdd(fl[ppHl]); }
  else if(e.key==='Backspace'&&this.value===''&&ppSelected.length){ ppSelected.pop(); renderPP(); }
  else if(e.key==='Escape'){ closePP(); }
});
document.getElementById('ppClose').addEventListener('click', closePP);
document.getElementById('ppStart').addEventListener('click', function(){
  if(!ppSelected.length) return;
  var all = [me].concat(ppSelected);
  var key = threadKey(all);
  closePP();
  // if no messages exist yet for this thread, create a placeholder and open it
  var existing = allMessages.filter(function(m){ return threadKey([m.sender].concat(m.recipients||[]))===key; });
  if(existing.length){
    openConv(key);
  } else {
    // set up the header without messages yet
    activeConvKey = key;
    var display = ppSelected.join(' & ');
    document.getElementById('chatTitle').textContent = display;
    document.getElementById('chatSub').innerHTML = '<span class="dot-live"></span> '+esc(display);
    document.getElementById('chatPill').style.display = '';
    document.getElementById('chatPill').textContent = '🔒 Private · '+all.length+' people';
    document.getElementById('chatAvatars').innerHTML = ppSelected.slice(0,2).map(function(o){
      return '<div style="width:32px;height:32px;border-radius:50%;background:'+aColor(o)+';display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0">'+ini(o)+'</div>';
    }).join('');
    document.getElementById('msgInput').placeholder = 'Message '+display+'…';
    document.getElementById('threadInner').innerHTML = '<div class="empty-thread">Start the conversation!</div>';
    buildConvList();
  }
});

document.addEventListener('click', function(e){
  if(!document.getElementById('ppPop').hidden && !document.getElementById('ppPop').contains(e.target) && !e.target.closest('.dl-new')) closePP();
});

// ── init ──
getUserMessages();
</script>
